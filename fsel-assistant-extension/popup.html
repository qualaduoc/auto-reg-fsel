<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --success-color: #10b981;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 16px;
      width: 320px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .logo-img {
      width: 28px;
      height: 28px;
      background-color: var(--accent-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }

    h3 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      background-color: var(--bg-card);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .toggle-label {
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #64748b;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--success-color);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .btn-save {
      background-color: var(--accent-color);
      color: white;
      border: none;
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-save:hover {
      background-color: var(--accent-hover);
    }

    .status-msg {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
    }

    .status-success {
      color: var(--success-color);
    }

    .status-error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-img">F</div>
    <div>
      <h3>FSEL Auto Assistant</h3>
      <div style="font-size: 0.75rem; color: var(--text-muted);">Hỗ trợ học tập bằng AI</div>
    </div>
  </div>

  <div class="form-group">
    <label for="gemini-key">Gemini API Key</label>
    <input type="text" id="gemini-key" placeholder="Nhập API Key từ Google AI Studio..." />
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Chế độ tự động làm bài (Auto-Solve)</span>
    <label class="switch">
      <input type="checkbox" id="auto-solve-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <button class="btn-save" id="btn-save">LƯU CẤU HÌNH</button>
  <div class="status-msg" id="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
